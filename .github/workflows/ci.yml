name: CI

on:
  push:
    branches: [v2-main, main]
  pull_request:
    branches: [v2-main, main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx playwright install chromium
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install backend deps
        working-directory: backend
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
      - name: Verify backend imports
        working-directory: backend
        run: |
          source venv/bin/activate
          python -c "from app.main import app; print('Backend imports OK')"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ENVIRONMENT: development
      - name: Start backend
        working-directory: backend
        run: |
          source venv/bin/activate
          uvicorn app.main:app --host 0.0.0.0 --port 8000 > ../backend.log 2>&1 &
          echo $! > ../backend.pid
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ENVIRONMENT: development
      - name: Wait for backend
        run: |
          npx wait-on http-get://127.0.0.1:8000/health --timeout 30000 || {
            echo "=== Backend failed to start. Logs: ==="
            cat backend.log || true
            echo "=== Process status: ==="
            kill -0 $(cat backend.pid) 2>/dev/null && echo "Process still running" || echo "Process crashed"
            exit 1
          }
      - name: Run API tests
        run: npx playwright test --project=api
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: api-test-results
          path: test-results/
          retention-days: 7

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install chromium
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install backend deps
        working-directory: backend
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
      - name: Start backend
        working-directory: backend
        run: |
          source venv/bin/activate
          ENABLE_TEST_LOGIN=true uvicorn app.main:app --host 0.0.0.0 --port 8000 > ../backend.log 2>&1 &
          echo $! > ../backend.pid
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ENABLE_TEST_LOGIN: true
          ENVIRONMENT: development
      - name: Wait for backend
        run: |
          npx wait-on http-get://127.0.0.1:8000/health --timeout 30000 || {
            echo "=== Backend failed to start. Logs: ==="
            cat backend.log || true
            echo "=== Process status: ==="
            kill -0 $(cat backend.pid) 2>/dev/null && echo "Process still running" || echo "Process crashed"
            exit 1
          }
      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
      - name: Start frontend
        working-directory: frontend
        run: npm run start &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: http://localhost:3000
      - name: Wait for frontend
        run: npx wait-on http-get://127.0.0.1:3000 --timeout 60000
      - name: Run E2E smoke tests
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_FRONTEND_URL: http://127.0.0.1:3000
          PLAYWRIGHT_BACKEND_URL: http://127.0.0.1:8000/api
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-test-results
          path: |
            test-results/
            playwright-report/
            backend.log
          retention-days: 7
